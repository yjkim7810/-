<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>암호화폐 실시간 가격 대시보드</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; margin-top: 50px; }
        table { margin: 0 auto; border-collapse: collapse; width: 50%; max-width: 600px; }
        th, td { padding: 15px; border: 1px solid #ddd; }
        th { background-color: #f4f4f4; }
        .update-time { font-size: 0.9em; color: gray; margin-top: 10px; }
    </style>
</head>
<body>

    <h1>💰 실시간 암호화폐 대시보드</h1>
    <p>CoinGecko API를 활용하여 데이터를 자동으로 가져옵니다.</p>

    <table>
        <thead>
            <tr>
                <th>코인명</th>
                <th>심볼</th>
                <th>현재 가격 (USD)</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>Bitcoin</td>
                <td>BTC</td>
                <td id="btc-price">로딩 중...</td>
            </tr>
            <tr>
                <td>Ethereum</td>
                <td>ETH</td>
                <td id="eth-price">로딩 중...</td>
            </tr>
        </tbody>
    </table>

    <div class="update-time" id="last-updated">마지막 업데이트: 대기 중...</div>

    <script>
        // CoinGecko API를 호출하여 가격을 가져오는 함수
        async function fetchCryptoPrices() {
            try {
                const response = await fetch('https://api.coingecko.com/api/v3/simple/price?ids=bitcoin,ethereum&vs_currencies=usd');
                const data = await response.json();

                // 표의 HTML 요소에 가격 데이터 채우기
                document.getElementById('btc-price').innerText = '$' + data.bitcoin.usd.toLocaleString();
                document.getElementById('eth-price').innerText = '$' + data.ethereum.usd.toLocaleString();

                // 마지막 업데이트 시간 표시
                const now = new Date();
                document.getElementById('last-updated').innerText = '마지막 업데이트: ' + now.toLocaleTimeString();
            } catch (error) {
                console.error('데이터를 불러오는데 실패했습니다:', error);
                document.getElementById('last-updated').innerText = '데이터 업데이트 실패';
            }
        }

        // 1. 웹페이지가 열리자마자 즉시 실행
        fetchCryptoPrices();

        // 2. 30초(30000 밀리초)마다 자동으로 함수 반복 실행 (실시간 업데이트)
        setInterval(fetchCryptoPrices, 30000);
    </script>

</body>
</html>
